<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Images</title>
    <script>
        function loadImage(src, element) {
            const img = new Image();
            img.src = src;
            img.onload = () => { element.src = src; };
            img.onerror = () => { element.src = 'fallback-icon.png'; };
        }
    </script>
</head>
<body>
    <div id="products">
        <!-- Dynamic product images go here -->
        <img data-src="https://reliable-image-service.com/image1.jpg" alt="Product 1" class="lazy-image" onload="loadImage(this.dataset.src, this)">
        <img data-src="https://reliable-image-service.com/image2.jpg" alt="Product 2" class="lazy-image" onload="loadImage(this.dataset.src, this)">
        <img data-src="https://reliable-image-service.com/image3.jpg" alt="Product 3" class="lazy-image" onload="loadImage(this.dataset.src, this)">
        <img data-src="https://reliable-image-service.com/image4.jpg" alt="Product 4" class="lazy-image" onload="loadImage(this.dataset.src, this)">
    </div>
    <style>
        .lazy-image {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lazy-image[src] {
            opacity: 1;
        }
    </style>
</body>
</html>
